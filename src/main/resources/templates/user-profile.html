<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Booking Profile - Calendly Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #006bff;
            --primary-dark: #0056cc;
            --secondary-color: #667085;
            --bg-color: #ffffff;
            --surface-color: #f9fbfc;
            --border-color: #e5e7eb;
            --text-main: #1a1c21;
            --text-muted: #475467;
            --radius-md: 12px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); line-height: 1.5; -webkit-font-smoothing: antialiased; }

        .card { background: white; border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 24px; box-shadow: var(--shadow-sm); }

        .profile-container {
            max-width: 800px;
            margin: 80px auto;
            text-align: center;
        }
        .avatar-large {
            width: 80px;
            height: 80px;
            background: var(--primary-color);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            margin: 0 auto 24px;
        }
        .profile-event-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            margin-top: 40px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="avatar-large" th:text="${user.fullName.substring(0,1)}">U</div>
        <h1 th:text="${user.fullName}" style="margin-bottom: 8px;">User Name</h1>
        <p style="color: var(--text-muted); max-width: 500px; margin: 0 auto;">Welcome to my scheduling page. Please select an event below to book a time with me.</p>

        <div class="profile-event-grid">
            <a th:each="type : ${eventTypes}" 
               th:href="'/' + ${user.slug} + '/' + ${type.id}" 
               class="card" 
               style="text-decoration: none; border-top: 4px solid; color: inherit; transition: transform 0.2s;"
               th:styleappend="'border-top-color: ' + ${type.color}"
               onmouseover="this.style.transform='translateY(-4px)'"
               onmouseout="this.style.transform='translateY(0)'">
                <h3 th:text="${type.name}" style="margin-bottom: 4px;">Meeting Name</h3>
                <div style="color: var(--text-muted); font-size: 0.875rem;" th:text="${type.duration} + ' mins'">30 mins</div>
            </a>
        </div>
    </div>
</body>
</html>
