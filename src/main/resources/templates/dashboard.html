<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Calendly Clone</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .dashboard-header {
            border-bottom: 1px solid var(--border-color);
            padding: 16px 0;
            margin-bottom: 32px;
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .event-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }
        .event-card {
            border-top: 8px solid;
            position: relative;
        }
        .event-duration {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 8px;
        }
        .event-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            display: block;
            margin-top: 16px;
        }
        /* Modal simple styling */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal:target { display: flex; }
        .modal-content {
            background: white;
            padding: 32px;
            border-radius: var(--radius-md);
            width: 100%;
            max-width: 500px;
        }
    </style>
</head>
<body>
    <header class="dashboard-header">
        <div class="container header-content">
            <div style="font-weight: 700; font-size: 1.25rem; color: var(--primary-color);">Calendly</div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <span th:text="${user.fullName}" style="font-weight: 500;">User Name</span>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn" style="padding: 6px 12px; font-size: 0.875rem;">Logout</button>
                </form>
            </div>
        </div>
    </header>

    <main class="container">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px;">
            <div>
                <h1 style="font-size: 2rem; margin-bottom: 4px;">Event Types</h1>
                <p style="color: var(--text-muted);">Manage your scheduling links and meeting types.</p>
            </div>
            <a href="#createModal" class="btn btn-primary">+ Create</a>
        </div>

        <div class="event-grid">
            <div th:each="type : ${eventTypes}" class="card event-card" th:style="'border-top-color: ' + ${type.color}">
                <h3 th:text="${type.name}" style="margin-bottom: 4px;">Meeting Name</h3>
                <div class="event-duration" th:text="${type.duration} + ' mins'">30 mins</div>
                <p th:text="${type.description}" style="font-size: 0.9375rem; color: var(--text-muted);">Description</p>
                <a th:href="'/' + ${user.slug} + '/' + ${type.id}" class="event-link">View booking page</a>
            </div>
        </div>

        <!-- Create Event Type Modal -->
        <div id="createModal" class="modal">
            <div class="card modal-content">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <h2>New Event Type</h2>
                    <a href="#" style="text-decoration: none; color: var(--text-muted); font-size: 1.5rem;">&times;</a>
                </div>
                <form th:action="@{/event-types}" method="post">
                    <div class="form-group">
                        <label class="label">Event Name</label>
                        <input type="text" name="name" class="input" placeholder="e.g. Discovery Call" required>
                    </div>
                    <div class="form-group">
                        <label class="label">Duration (minutes)</label>
                        <select name="duration" class="input">
                            <option value="15">15 mins</option>
                            <option value="30" selected>30 mins</option>
                            <option value="45">45 mins</option>
                            <option value="60">60 mins</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="label">Description</label>
                        <textarea name="description" class="input" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="label">Color</label>
                        <input type="color" name="color" value="#006bff" class="input" style="height: 44px; padding: 4px;">
                    </div>
                    <div style="display: flex; gap: 12px; margin-top: 24px;">
                        <a href="#" class="btn" style="flex: 1; border: 1px solid var(--border-color);">Cancel</a>
                        <button type="submit" class="btn btn-primary" style="flex: 1;">Create</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
